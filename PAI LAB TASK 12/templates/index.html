<!DOCTYPE html>
<html>

<head>
    <title>AI Campus Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #ddd;
        }

        .box {
            width: 420px;
            margin: 20px auto;
            background: white;
            padding: 12px;
            border-radius: 10px;
        }

        h3 {
            text-align: center;
            color: #333;
        }

        .chat {
            height: 400px;
            overflow-y: auto;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        input {
            width: 75%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <div class="box">

        <!-- ✅ FINAL TITLE -->
        <h3>AI Campus Assistant</h3>

        <div class="chat" id="chat"></div>

        <input id="msg" placeholder="Ask your question...">
        <button onclick="send()">Send</button>

    </div>

    <script>
        function send() {
            let msg = document.getElementById("msg").value;

            if (msg.trim() === "") return;

            fetch("/get?msg=" + msg)
                .then(r => r.text())
                .then(data => {

                    document.getElementById("chat").innerText +=
                        "You: " + msg + "\n" +
                        "Bot: " + data + "\n\n";

                });

            document.getElementById("msg").value = "";
        }
    </script>

</body>

</html>
