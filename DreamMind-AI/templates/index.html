<!DOCTYPE html>
<html>
<head>
<title>DreamMind AI • Insta Split</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#1e1b4b,#0b0f1a);
    height:100vh;
    display:flex;
    color:white;
}

/* LEFT PANEL */
.left{
    width:35%;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    padding:20px;
    border-right:1px solid #1f2937;
}

h2{
    color:#6366f1;
}

/* INPUT */
textarea{
    margin-top:15px;
    height:150px;
    resize:none;
    border:none;
    outline:none;
    border-radius:12px;
    padding:10px;
    background:#1f2937;
    color:white;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#6366f1,#8b5cf6);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

/* RIGHT PANEL */
.right{
    width:65%;
    padding:25px;
    overflow-y:auto;
}

/* CARDS */
.card{
    background:#111827;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(99,102,241,0.1);
}

.badge{
    display:inline-block;
    padding:5px 8px;
    margin:3px;
    background:#374151;
    border-radius:8px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="left">
    <h2>🌙 DreamMind AI</h2>
    <p>Type your dream (Instagram AI mode)</p>

    <textarea id="dream" placeholder="e.g. I was flying in sky..."></textarea>

    <button onclick="analyze()">Analyze Dream</button>
</div>

<div class="right">

    <div class="card">
        <h3>🧠 Emotion</h3>
        <div id="emotion">Waiting...</div>
    </div>

    <div class="card">
        <h3>💡 Meaning</h3>
        <div id="meaning"></div>
    </div>

    <div class="card">
        <h3>📊 Confidence</h3>
        <div id="confidence"></div>
    </div>

</div>

<script>

async function analyze(){

    let dream = document.getElementById("dream").value;

    if(!dream.trim()){
        alert("Enter dream!");
        return;
    }

    document.getElementById("emotion").innerHTML = "⏳ Analyzing...";
    document.getElementById("meaning").innerHTML = "";
    document.getElementById("confidence").innerHTML = "";

    let res = await fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:dream})
    });

    let data = await res.json();

    let emotion = data.result?.length ? data.result.join(", ") : "Unknown";
    document.getElementById("emotion").innerHTML = "🌙 " + emotion;

   
    document.getElementById("meaning").innerHTML = data.meaning;

  
    let conf = "";

    if(data.top_predictions?.length){
        data.top_predictions.forEach(p=>{
            conf += `<div class="badge">${p.emotion} ${(p.score*100).toFixed(1)}%</div>`;
        });
    } else {
        conf = "No confidence data";
    }

    document.getElementById("confidence").innerHTML = conf;
}

</script>

</body>
</html>
