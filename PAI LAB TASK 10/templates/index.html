<!DOCTYPE html>
<html>
<head>
<title>Campus Chatbot</title>
<style>
body{font-family:Arial;background:#e5ddd5;margin:0}
.chat-container{width:400px;height:600px;margin:20px auto;background:#fff;display:flex;flex-direction:column;border-radius:10px;box-shadow:0 0 10px gray}
.header{background:#075e54;color:white;padding:15px;text-align:center}
.chat-box{flex:1;padding:10px;overflow-y:auto;background:#ece5dd}
.msg{padding:8px 12px;margin:5px;border-radius:8px;max-width:75%}
.user{background:#dcf8c6;float:right;clear:both}
.bot{background:white;float:left;clear:both}
.input-box{display:flex;border-top:1px solid #ccc}
input{flex:1;padding:10px;border:none;outline:none}
button{background:#075e54;color:white;border:none;padding:10px 15px}
</style>
</head>
<body>

<div class="chat-container">
<div class="header">Campus Help Desk Bot</div>
<div class="chat-box" id="chat"></div>

<div class="input-box">
<input id="msg" placeholder="Ask question...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
function addMessage(text,type){
let chat=document.getElementById("chat");
let div=document.createElement("div");
div.classList.add("msg",type);
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function send(){
let msg=document.getElementById("msg").value;
if(msg==="") return;

addMessage(msg,"user");

fetch("/get?msg="+msg)
.then(r=>r.text())
.then(data=>{
addMessage(data,"bot");
});

document.getElementById("msg").value="";
}
</script>

</body>
</html>
